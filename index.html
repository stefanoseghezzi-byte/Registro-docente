<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Docente</title>
<meta name="theme-color" content="#f0efe8">
<link rel="manifest" href="./manifest.webmanifest">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f0}
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:600;flex:1;color:#1a1a1a}
.nav{display:flex;gap:4px}
.nav button{background:transparent;border:1px solid transparent;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;color:#666;transition:all .15s}
.nav button.active{background:#f0efe8;border-color:#ddd;color:#1a1a1a;font-weight:500}
.nav button:hover:not(.active){background:#f5f5f0}
.content{padding:20px;max-width:900px;margin:0 auto}
.sec{display:none}.sec.active{display:block}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid #e5e5e0}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;border-bottom:2px solid transparent;color:#888;background:transparent;transition:all .15s}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:16px;margin-bottom:12px}
.ctitle{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
label{font-size:13px;color:#666;display:block;margin-top:10px;margin-bottom:4px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fff;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:#888}
textarea{resize:vertical;min-height:90px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>div{flex:1;min-width:130px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;color:#1a1a1a;font-family:inherit;transition:all .15s}
.btn:hover{background:#f5f5f0}
.btnp{background:#f0efe8;border-color:#ccc;font-weight:500}
.btnp:hover{background:#e8e7e0}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.b-blue{background:#deedfb;color:#174f80}
.b-green{background:#ddf0d5;color:#235a1a}
.b-amb{background:#fce8c0;color:#7a4a00}
.b-red{background:#fde0e0;color:#8a1a1a}
.b-gray{background:#efefeb;color:#555}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:600;font-size:11px;color:#888;border-bottom:1px solid #e5e5e0;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 10px;border-bottom:1px solid #f0efe8;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fcfcfa}
.empty{text-align:center;padding:32px;color:#aaa;font-size:13px}
.metric{background:#f5f5f0;border-radius:8px;padding:14px;text-align:center;flex:1}
.ml{font-size:11px;color:#888;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.mv{font-size:24px;font-weight:600}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters select,.filters input{width:auto;flex:1;min-width:100px}
.del{background:transparent;border:none;color:#bbb;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.del:hover{color:#c0392b;background:#fde0e0}
.voto-ok{color:#2d7a1a}
.voto-suff{color:#b07000}
.voto-ins{color:#c0392b}
.month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}
.month-head{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.04em;text-align:center}
.month-day{background:#fff;border:1px solid #e5e5e0;border-radius:10px;min-height:120px;padding:8px}
.month-day.off{opacity:.45;background:#fafaf8}
.month-num{font-size:12px;font-weight:600;margin-bottom:6px}
.month-item{font-size:11px;line-height:1.35;background:#f5f5f0;border-radius:6px;padding:4px 6px;margin-bottom:4px}
.help{font-size:12px;color:#777;line-height:1.5}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:100;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="topbar">
  <h1>📚 Registro Docente</h1>
  <div class="nav">
    <button class="active" onclick="show('lezioni',this)">Lezioni</button>
    <button onclick="show('calendario',this)">Calendario</button>
    <button onclick="show('voti',this)">Voti</button>
    <button onclick="show('riflessioni',this)">Riflessioni</button>
    <button onclick="show('memo',this)">Memo</button>
    <button onclick="show('riepilogo',this)">Riepilogo</button>
  </div>
</div>

<div class="content">

<!-- LEZIONI -->
<div id="s-lezioni" class="sec active">
  <div class="tabs">
    <button class="tab active" onclick="stab('lezioni','ln',this)">Nuova lezione</button>
    <button class="tab" onclick="stab('lezioni','ls',this)">Storico</button>
  </div>
  <div id="ln">
    <div class="card">
      <div class="ctitle">Registra lezione</div>
      <div class="row"><div><label>Data</label><input type="date" id="ld"></div><div><label>Classe</label><select id="lc"><option value="">— seleziona —</option></select></div></div>
      <label>Argomento svolto</label><input type="text" id="larg" placeholder="es. Equazioni di primo grado">
      <label>Attività / metodo</label><input type="text" id="latt" placeholder="es. Lezione frontale, lavoro a coppie...">
      <label>Compiti assegnati</label><input type="text" id="lcomp" placeholder="es. Esercizi pag. 45 n. 1–6">
      <label>Note libere</label><textarea id="lnote" placeholder="Osservazioni sulla lezione..."></textarea>
      <div style="margin-top:14px"><button class="btn btnp" onclick="saveL()">Salva lezione</button></div>
    </div>
  </div>
  <div id="ls" style="display:none">
    <div class="filters">
      <select id="flc" onchange="renderL()"><option value="">Tutte le classi</option></select>
      <input type="text" id="fls" placeholder="Cerca argomento..." oninput="renderL()" style="flex:2">
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr><th>Data</th><th>Classe</th><th>Argomento</th><th>Compiti</th><th></th></tr></thead>
      <tbody id="ltb"></tbody></table>
    </div>
  </div>
</div>

<!-- CALENDARIO -->
<div id="s-calendario" class="sec">
  <div class="tabs">
    <button class="tab active" onclick="stab('calendario','co',this)">Orario settimanale</button>
    <button class="tab" onclick="stab('calendario','cw',this)">Settimana</button>
    <button class="tab" onclick="stab('calendario','cm',this)">Mese</button>
  </div>
  <div id="co">
    <div class="card">
      <div class="ctitle">Nuova ora ricorrente</div>
      <div class="row">
        <div><label>Giorno</label><select id="cday">
          <option value="1">Lunedì</option><option value="2">Martedì</option><option value="3">Mercoledì</option>
          <option value="4">Giovedì</option><option value="5">Venerdì</option><option value="6">Sabato</option>
        </select></div>
        <div><label>Inizio</label><input type="time" id="cstart"></div>
        <div><label>Fine</label><input type="time" id="cend"></div>
      </div>
      <div class="row">
        <div><label>Classe</label><select id="ccl"><option value="">— seleziona —</option></select></div>
        <div><label>Materia / focus</label><input type="text" id="csub" placeholder="es. Matematica - Equazioni"></div>
      </div>
      <label>Nota didattica (opz.)</label><input type="text" id="cnote" placeholder="es. Verifica breve, laboratorio...">
      <div style="margin-top:14px"><button class="btn btnp" onclick="saveCal()">Salva nell'orario</button></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr><th>Giorno</th><th>Orario</th><th>Classe</th><th>Materia / focus</th><th>Nota</th><th></th></tr></thead>
      <tbody id="cotb"></tbody></table>
    </div>
  </div>
  <div id="cw" style="display:none">
    <div class="filters">
      <input type="date" id="cwdate" onchange="renderWeek()">
      <select id="cwcl" onchange="renderWeek()"><option value="">Tutte le classi</option></select>
    </div>
    <div id="cweek"></div>
  </div>
  <div id="cm" style="display:none">
    <div class="filters">
      <input type="month" id="cmmonth" onchange="renderMonth()">
      <select id="cmcl" onchange="renderMonth()"><option value="">Tutte le classi</option></select>
    </div>
    <div id="cmonth"></div>
  </div>
</div>

<!-- VOTI -->
<div id="s-voti" class="sec">
  <div class="tabs">
    <button class="tab active" onclick="stab('voti','vn',this)">Nuovo voto</button>
    <button class="tab" onclick="stab('voti','vr',this)">Registro</button>
    <button class="tab" onclick="stab('voti','vm',this)">Medie</button>
    <button class="tab" onclick="stab('voti','vc',this)">Classi / studenti</button>
  </div>
  <div id="vn">
    <div class="card">
      <div class="ctitle">Inserisci voto</div>
      <div class="row">
        <div><label>Classe</label><select id="vcl" onchange="popS()"><option value="">— seleziona —</option></select></div>
        <div><label>Studente</label><select id="vst"><option value="">— seleziona —</option></select></div>
      </div>
      <div class="row">
        <div><label>Data</label><input type="date" id="vd"></div>
        <div><label>Tipologia</label><select id="vtip">
          <option value="scritto">Scritto (peso ×2)</option>
          <option value="orale">Orale (peso ×1)</option>
          <option value="pratico">Pratico (peso ×1)</option>
        </select></div>
        <div><label>Voto (1–10)</label><input type="number" id="vv" min="1" max="10" step="0.5" placeholder="7.5"></div>
      </div>
      <label>Descrizione prova</label><input type="text" id="vdesc" placeholder="es. Verifica cap. 3, Interrogazione orale...">
      <div style="margin-top:14px"><button class="btn btnp" onclick="saveV()">Salva voto</button></div>
    </div>
  </div>
  <div id="vr" style="display:none">
    <div class="filters">
      <select id="fvc" onchange="renderV()"><option value="">Tutte le classi</option></select>
      <select id="fvt" onchange="renderV()">
        <option value="">Tutti i tipi</option>
        <option value="scritto">Scritto</option>
        <option value="orale">Orale</option>
        <option value="pratico">Pratico</option>
      </select>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr><th>Data</th><th>Classe</th><th>Studente</th><th>Tipo</th><th>Voto</th><th>Prova</th><th></th></tr></thead>
      <tbody id="vtb"></tbody></table>
    </div>
  </div>
  <div id="vm" style="display:none">
    <div class="filters">
      <select id="fvm" onchange="renderM()"><option value="">Tutte le classi</option></select>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr><th>Classe</th><th>Studente</th><th>Scritti ×2</th><th>Orali ×1</th><th>Pratici ×1</th><th>Media pond.</th></tr></thead>
      <tbody id="mtb"></tbody></table>
    </div>
  </div>
  <div id="vc" style="display:none">
    <div class="card">
      <div class="ctitle">Nuova classe</div>
      <div class="row">
        <div><label>Nome classe</label><input type="text" id="ncl" placeholder="es. 1A, 2B..."></div>
        <div><label>Descrizione (opz.)</label><input type="text" id="ncd" placeholder="es. Liceo scientifico"></div>
      </div>
      <div style="margin-top:10px"><button class="btn btnp" onclick="addC()">+ Aggiungi classe</button></div>
    </div>
    <div id="cllist"></div>
  </div>
</div>

<!-- MEMO -->
<div id="s-memo" class="sec">
  <div class="tabs">
    <button class="tab active" onclick="stab('memo','mn',this)">Nuovo memo</button>
    <button class="tab" onclick="stab('memo','ml',this)">Lista memo</button>
  </div>
  <div id="mn">
    <div class="card">
      <div class="ctitle">Promemoria personale</div>
      <label>Titolo</label><input type="text" id="mtit" placeholder="es. Preparare verifica 2B">
      <label>Scadenza</label><input type="datetime-local" id="mdue">
      <label>Note</label><textarea id="mtx" placeholder="Dettagli utili..."></textarea>
      <div class="row">
        <div><label><input type="checkbox" id="mnot" checked style="width:auto;margin-right:6px"> Notifica browser</label></div>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btnp" onclick="saveMemo()">Salva memo</button>
        <button class="btn" onclick="enableNotif()">Abilita notifiche</button>
      </div>
    </div>
  </div>
  <div id="ml" style="display:none">
    <div class="filters">
      <select id="mfilter" onchange="renderMemo()">
        <option value="open">Aperti</option>
        <option value="all">Tutti</option>
        <option value="done">Completati</option>
      </select>
    </div>
    <div id="mlist"></div>
  </div>
</div>

<!-- RIFLESSIONI -->
<div id="s-riflessioni" class="sec">
  <div class="tabs">
    <button class="tab active" onclick="stab('riflessioni','rn',this)">Nuova riflessione</button>
    <button class="tab" onclick="stab('riflessioni','ra',this)">Archivio</button>
  </div>
  <div id="rn">
    <div class="card">
      <div class="ctitle">Riflessione / osservazione</div>
      <div class="row">
        <div><label>Data</label><input type="date" id="rd"></div>
        <div><label>Classe (opz.)</label><select id="rc" onchange="popRS()"><option value="">— generale —</option></select></div>
        <div><label>Studente (opz.)</label><select id="rs"><option value="">— su lezione —</option></select></div>
      </div>
      <div class="row">
        <div><label>Tipo</label><select id="rtp">
          <option value="lezione">Riflessione su lezione</option>
          <option value="studente">Osservazione su studente</option>
          <option value="generale">Nota generale</option>
        </select></div>
        <div><label>Priorità</label><select id="rpr">
          <option value="1">Bassa</option>
          <option value="2" selected>Media</option>
          <option value="3">Alta</option>
        </select></div>
      </div>
      <label>Testo</label>
      <textarea id="rtx" style="min-height:120px" placeholder="Scrivi qui la tua riflessione..."></textarea>
      <div style="margin-top:14px"><button class="btn btnp" onclick="saveR()">Salva riflessione</button></div>
    </div>
  </div>
  <div id="ra" style="display:none">
    <div class="filters">
      <select id="frc" onchange="renderR()"><option value="">Tutte le classi</option></select>
      <select id="frt" onchange="renderR()">
        <option value="">Tutti i tipi</option>
        <option value="lezione">Su lezione</option>
        <option value="studente">Su studente</option>
        <option value="generale">Generale</option>
      </select>
    </div>
    <div id="rlist"></div>
  </div>
</div>

<!-- RIEPILOGO -->
<div id="s-riepilogo" class="sec">
  <div id="rpg"></div>
</div>

</div>

<script>
const SK = 'registro_docente_v3';
const CLOUD_URL_KEY = 'registro_supabase_url';
const CLOUD_ANON_KEY = 'registro_supabase_anon_key';
const CLOUD_TABLE = 'registro_states';
let db = {classi:[],studenti:[],lezioni:[],orario:[],voti:[],riflessioni:[],memo:[]};
let cloudClient = null;
let cloudReady = false;
let cloudUserId = null;
let cloudAuthSub = null;

async function load(){
  try{ const d=localStorage.getItem(SK); if(d) db=JSON.parse(d); }catch(e){}
  if(!Array.isArray(db.orario)) db.orario=[];
  if(!Array.isArray(db.memo)) db.memo=[];
  if(!db.meta) db.meta={updatedAt:new Date().toISOString()};
  initCloud();
  await refreshAuthState();
  await pullCloud(false);
  init();
}
function markDirty(){ db.meta={...(db.meta||{}),updatedAt:new Date().toISOString()}; }
function sv(){
  localStorage.setItem(SK,JSON.stringify(db));
  pushCloud();
}
function initCloud(){
  const url=localStorage.getItem(CLOUD_URL_KEY)||'';
  const key=localStorage.getItem(CLOUD_ANON_KEY)||'';
  if(url && key && window.supabase?.createClient){
    cloudClient=window.supabase.createClient(url,key);
    cloudReady=true;
    if(cloudAuthSub?.subscription){ cloudAuthSub.subscription.unsubscribe(); }
    cloudAuthSub=cloudClient.auth.onAuthStateChange(async ()=>{
      await refreshAuthState();
      hydrateCloudForm();
      await pullCloud(false);
    }).data;
  }else{
    cloudClient=null;
    cloudReady=false;
    cloudUserId=null;
  }
}
async function refreshAuthState(){
  cloudUserId = null;
  if(!cloudReady) return;
  try{
    const {data}=await cloudClient.auth.getSession();
    cloudUserId=data?.session?.user?.id||null;
  }catch(_e){}
}
function saveCloudSettings(){
  const url=(document.getElementById('supUrl')?.value||'').trim();
  const key=(document.getElementById('supKey')?.value||'').trim();
  localStorage.setItem(CLOUD_URL_KEY,url);
  localStorage.setItem(CLOUD_ANON_KEY,key);
  initCloud();
  hydrateCloudForm();
  if(cloudReady){
    toast('Configurazione salvata');
  }else{
    toast('Inserisci URL e Anon key validi');
  }
  refreshAuthState().then(()=>pullCloud(true));
}
function hydrateCloudForm(){
  const u=document.getElementById('supUrl'),k=document.getElementById('supKey');
  if(u) u.value=localStorage.getItem(CLOUD_URL_KEY)||'';
  if(k) k.value=localStorage.getItem(CLOUD_ANON_KEY)||'';
  const st=document.getElementById('supAuthState');
  if(st) st.textContent = cloudUserId ? `Connesso: ${cloudUserId.slice(0,8)}...` : 'Non connesso';
}
async function pushCloud(){
  if(!cloudReady) return;
  const userId=cloudUserId;
  if(!userId) return;
  try{
    await cloudClient.from(CLOUD_TABLE).upsert({
      user_id:userId,
      payload:db,
      updated_at:db.meta?.updatedAt||new Date().toISOString()
    });
  }catch(_e){}
}
async function pullCloud(showToast){
  if(!cloudReady) return;
  const userId=cloudUserId;
  if(!userId) return;
  try{
    const {data,error}=await cloudClient.from(CLOUD_TABLE).select('payload,updated_at').eq('user_id',userId).maybeSingle();
    if(error || !data || !data.payload) return;
    const remote=data.payload;
    const localTs=new Date(db.meta?.updatedAt||0).getTime();
    const remoteTs=new Date(remote.meta?.updatedAt||data.updated_at||0).getTime();
    if(remoteTs>localTs){
      db=remote;
      localStorage.setItem(SK,JSON.stringify(db));
      if(showToast) toast('Dati aggiornati dal cloud');
      if(typeof renderL==='function'){
        refsels(); renderL(); renderCal(); renderWeek(); renderMonth(); renderV(); renderM(); renderClList(); renderR(); renderMemo(); renderRpg();
      }
    }else if(showToast){
      toast('Dati locali gia aggiornati');
    }
  }catch(_e){}
}
async function cloudLogin(){
  if(!cloudReady){toast('Salva prima URL e key');return;}
  const email=(document.getElementById('supEmail')?.value||'').trim();
  if(!email){toast('Inserisci email');return;}
  try{
    const redirectTo=window.location.href.split('#')[0];
    const {error}=await cloudClient.auth.signInWithOtp({email,options:{emailRedirectTo:redirectTo}});
    if(error){toast('Errore login: '+error.message);return;}
    toast('Controlla la mail per il link di accesso');
  }catch(_e){
    toast('Errore durante il login');
  }
}
async function cloudLogout(){
  if(!cloudReady) return;
  try{ await cloudClient.auth.signOut(); }catch(_e){}
  cloudUserId=null;
  hydrateCloudForm();
  toast('Disconnesso');
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtD(d){ if(!d)return''; const[y,m,g]=d.split('-'); return`${g}/${m}/${y}`; }
function vCol(v){ return v>=7?'#2d7a1a':v>=6?'#b07000':'#c0392b'; }
function avg(arr){ return arr.reduce((a,b)=>a+b.voto,0)/arr.length; }
function calcM(voti){
  if(!voti.length) return null;
  const w={scritto:2,orale:1,pratico:1};
  let sw=0,tw=0;
  voti.forEach(v=>{const wp=w[v.tipo]||1;sw+=v.voto*wp;tw+=wp;});
  return tw?sw/tw:null;
}
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
}

function init(){
  const today=new Date().toISOString().split('T')[0];
  ['ld','vd','rd','cwdate'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=today;});
  const cm=document.getElementById('cmmonth'); if(cm) cm.value=today.slice(0,7);
  const now=new Date();
  const localNow=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  const md=document.getElementById('mdue'); if(md) md.value=localNow;
  refsels(); renderL(); renderCal(); renderWeek(); renderMonth(); renderV(); renderM(); renderClList(); renderR(); renderMemo(); renderRpg();
  setInterval(checkMemoReminders,30000);
  checkMemoReminders();
  registerPwa();
}
function registerPwa(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
}

function refsels(){

/* CALENDARIO */
function dayLabel(n){return ['','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'][n]||'';}
function mondayOf(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const day=(d.getDay()+6)%7;
  d.setDate(d.getDate()-day);
  return d;
}
function isoDate(d){return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function saveCal(){
  const dow=parseInt(document.getElementById('cday').value,10);
  const start=document.getElementById('cstart').value;
  const end=document.getElementById('cend').value;
  const cid=document.getElementById('ccl').value;
  const sub=document.getElementById('csub').value.trim();
  if(!dow||!start||!end||!cid||!sub){toast('Compila tutti i campi obbligatori');return;}
  if(start>=end){toast('Orario non valido: fine deve essere dopo inizio');return;}
  db.orario.push({id:uid(),dow,start,end,cid,sub,note:document.getElementById('cnote').value.trim()});
  ['csub','cnote'].forEach(id=>document.getElementById(id).value='');
  markDirty(); sv(); renderCal(); renderWeek(); renderRpg(); toast('✓ Orario aggiornato');
}
function delCal(id){db.orario=db.orario.filter(o=>o.id!==id);markDirty();sv();renderCal();renderWeek();renderRpg();}
function renderCal(){
  const tb=document.getElementById('cotb'); if(!tb) return;
  const list=[...db.orario].sort((a,b)=>a.dow-b.dow||a.start.localeCompare(b.start));
  if(!list.length){tb.innerHTML='<tr><td colspan="6" class="empty">Nessuna ora in orario settimanale.</td></tr>';return;}
  tb.innerHTML=list.map(o=>{
    const cn=db.classi.find(c=>c.id===o.cid)?.nome||'?';
    return`<tr>
      <td>${dayLabel(o.dow)}</td>
      <td style="white-space:nowrap">${o.start} - ${o.end}</td>
      <td><span class="badge b-blue">${cn}</span></td>
      <td>${o.sub}</td>
      <td style="font-size:12px;color:#888">${o.note||'—'}</td>
      <td><button class="del" onclick="delCal('${o.id}')">×</button></td></tr>`;
  }).join('');
}
function renderWeek(){
  const el=document.getElementById('cweek'); if(!el) return;
  syncF('cwcl');
  const ref=document.getElementById('cwdate')?.value||new Date().toISOString().slice(0,10);
  const fc=document.getElementById('cwcl')?.value||'';
  const m=mondayOf(ref);
  let h='';
  for(let i=0;i<6;i++){
    const cur=new Date(m); cur.setDate(m.getDate()+i);
    const day=i+1;
    let slots=db.orario.filter(o=>o.dow===day).sort((a,b)=>a.start.localeCompare(b.start));
    if(fc) slots=slots.filter(s=>s.cid===fc);
    h+=`<div class="card"><div class="ctitle">${dayLabel(day)} • ${fmtD(isoDate(cur))}</div>`;
    if(!slots.length){h+='<div style="font-size:13px;color:#aaa">Nessuna ora pianificata.</div></div>'; continue;}
    h+='<table><thead><tr><th>Orario</th><th>Classe</th><th>Focus</th><th>Nota</th></tr></thead><tbody>';
    slots.forEach(s=>{
      const cn=db.classi.find(c=>c.id===s.cid)?.nome||'?';
      h+=`<tr><td style="white-space:nowrap">${s.start} - ${s.end}</td><td><span class="badge b-blue">${cn}</span></td><td>${s.sub}</td><td style="font-size:12px;color:#888">${s.note||'—'}</td></tr>`;
    });
    h+='</tbody></table></div>';
  }
  el.innerHTML=h;
}
function startMonthGrid(monthStr){
  const [y,m]=monthStr.split('-').map(Number);
  const first=new Date(y,m-1,1);
  const startShift=(first.getDay()+6)%7;
  const start=new Date(first);
  start.setDate(1-startShift);
  return start;
}
function renderMonth(){
  const el=document.getElementById('cmonth'); if(!el) return;
  syncF('cmcl');
  const monthStr=document.getElementById('cmmonth')?.value||new Date().toISOString().slice(0,7);
  const fc=document.getElementById('cmcl')?.value||'';
  const [y,m]=monthStr.split('-').map(Number);
  const monthIdx=m-1;
  const weekHead=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  let h='<div class="month-grid">'+weekHead.map(d=>`<div class="month-head">${d}</div>`).join('')+'</div>';
  h+='<div class="month-grid">';
  const start=startMonthGrid(monthStr);
  for(let i=0;i<42;i++){
    const cur=new Date(start);
    cur.setDate(start.getDate()+i);
    const dayNum=cur.getDate();
    const inMonth=cur.getMonth()===monthIdx;
    const dow=(cur.getDay()+6)%7+1;
    let slots=db.orario.filter(o=>o.dow===dow).sort((a,b)=>a.start.localeCompare(b.start));
    if(fc) slots=slots.filter(s=>s.cid===fc);
    h+=`<div class="month-day ${inMonth?'':'off'}"><div class="month-num">${dayNum}</div>`;
    if(inMonth && slots.length){
      h+=slots.slice(0,4).map(s=>{
        const cn=db.classi.find(c=>c.id===s.cid)?.nome||'?';
        return `<div class="month-item">${s.start}-${s.end} • ${cn}<br>${s.sub}</div>`;
      }).join('');
      if(slots.length>4) h+=`<div class="month-item">+${slots.length-4} altre ore</div>`;
    }
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

function saveMemo(){
  const tit=document.getElementById('mtit').value.trim();
  const due=document.getElementById('mdue').value;
  if(!tit||!due){toast('Compila titolo e scadenza');return;}
  db.memo.push({
    id:uid(),
    tit,
    due,
    note:document.getElementById('mtx').value.trim(),
    notify:document.getElementById('mnot').checked,
    done:false,
    notifiedAt:null
  });
  ['mtit','mtx'].forEach(id=>document.getElementById(id).value='');
  markDirty(); sv(); renderMemo(); renderRpg(); toast('✓ Memo salvato');
}
function toggleMemo(id){
  const m=db.memo.find(x=>x.id===id); if(!m) return;
  m.done=!m.done;
  markDirty(); sv(); renderMemo(); renderRpg();
}
function delMemo(id){db.memo=db.memo.filter(m=>m.id!==id);markDirty();sv();renderMemo();renderRpg();}
function renderMemo(){
  const el=document.getElementById('mlist'); if(!el) return;
  const f=document.getElementById('mfilter')?.value||'open';
  let list=[...db.memo].sort((a,b)=>a.due.localeCompare(b.due));
  if(f==='open') list=list.filter(m=>!m.done);
  if(f==='done') list=list.filter(m=>m.done);
  if(!list.length){el.innerHTML='<div class="empty">Nessun memo.</div>';return;}
  const now=Date.now();
  el.innerHTML=list.map(m=>{
    const overdue=!m.done&&new Date(m.due).getTime()<now;
    return `<div class="card">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <span class="badge ${m.done?'b-green':(overdue?'b-red':'b-amb')}">${m.done?'Completato':(overdue?'In ritardo':'Da fare')}</span>
        <strong>${m.tit}</strong>
        <span style="font-size:12px;color:#888">• ${m.due.replace('T',' ')}</span>
        <button class="btn" style="margin-left:auto" onclick="toggleMemo('${m.id}')">${m.done?'Riapri':'Completa'}</button>
        <button class="del" onclick="delMemo('${m.id}')">×</button>
      </div>
      <p style="font-size:13px;color:#555;line-height:1.5">${m.note||'—'}</p>
    </div>`;
  }).join('');
}
function checkMemoReminders(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const now=Date.now();
  let changed=false;
  db.memo.forEach(m=>{
    if(!m.notify||m.done||m.notifiedAt) return;
    if(new Date(m.due).getTime()<=now){
      new Notification('Memo docente',{body:`${m.tit} (${m.due.replace('T',' ')})`});
      m.notifiedAt=new Date().toISOString();
      changed=true;
    }
  });
  if(changed){markDirty(); sv(); renderMemo();}
}

    </div>
    <div id="supAuthState" class="help"></div>
    <div class="help">Accedi con la stessa email su tutti i dispositivi: i dati si sincronizzano in modo sicuro.</div>
  </div>
  <div class="row" style="margin-bottom:16px">
    <div class="metric"><div class="ml">Classi</div><div class="mv">${db.classi.length}</div></div>
    <div class="metric"><div class="ml">Studenti</div><div class="mv">${db.studenti.length}</div></div>
    <div class="metric"><div class="ml">Lezioni</div><div class="mv">${db.lezioni.length}</div></div>
    <div class="metric"><div class="ml">Ore settimanali</div><div class="mv">${db.orario.length}</div></div>
    <div class="metric"><div class="ml">Memo aperti</div><div class="mv">${db.memo.filter(m=>!m.done).length}</div></div>
    <div class="metric"><div class="ml">Voti</div><div class="mv">${db.voti.length}</div></div>
  </div>`;
  if(mm) h+=`<div class="metric" style="margin-bottom:16px"><div class="ml">Media ponderata generale</div><div class="mv" style="font-size:36px;color:${vCol(mm)}">${mm.toFixed(2)}</div></div>`;
  if(db.classi.length){
    h+='<div class="card"><div class="ctitle">Per classe</div><table><thead><tr><th>Classe</th><th>Studenti</th><th>Lezioni</th><th>Ore sett.</th><th>Voti</th><th>Media pond.</th></tr></thead><tbody>';
    db.classi.forEach(c=>{
      const ns=db.studenti.filter(s=>s.cid===c.id).length;
      const nl=db.lezioni.filter(l=>l.cid===c.id).length;
      const no=db.orario.filter(o=>o.cid===c.id).length;
      const nv=db.voti.filter(v=>v.cid===c.id);
      const m=calcM(nv);
      h+=`<tr><td><span class="badge b-blue">${c.nome}</span></td><td>${ns}</td><td>${nl}</td><td>${no}</td><td>${nv.length}</td><td>${m?`<strong style="color:${vCol(m)}">${m.toFixed(2)}</strong>`:'—'}</td></tr>`;
    });
    h+='</tbody></table></div>';
  }
  const alta=db.riflessioni.filter(r=>r.pri===3);
  if(alta.length){
    h+='<div class="card" style="margin-top:12px"><div class="ctitle">Riflessioni ad alta priorità</div>';
    alta.slice(0,5).forEach(r=>{
      const cn=r.cid?db.classi.find(c=>c.id===r.cid)?.nome:'';
      const sn=r.sid?db.studenti.find(s=>s.id===r.sid)?.nome:'';
      h+=`<div style="padding:10px 0;border-bottom:1px solid #f0efe8">
        <div style="display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap">
          ${cn?`<span class="badge b-blue">${cn}</span>`:''}
          ${sn?`<span class="badge b-green">${sn}</span>`:''}
          <span style="font-size:12px;color:#888">${fmtD(r.data)}</span>
        </div>
        <p style="font-size:13px;line-height:1.5;color:#333">${r.testo.slice(0,150)}${r.testo.length>150?'…':''}</p>
      </div>`;
    });
    h+='</div>';
  }
  if(!db.classi.length) h+='<div class="empty" style="padding:48px">Nessun dato ancora.<br>Inizia aggiungendo le classi nella sezione <strong>Voti → Classi / studenti</strong>.</div>';
  el.innerHTML=h;
  hydrateCloudForm();
}

function syncF(id){
  const el=document.getElementById(id); if(!el) return;
  const isF=id.startsWith('f')||id==='cwcl'||id==='cmcl';
  const cur=el.value;
  el.innerHTML=isF?'<option value="">Tutte le classi</option>':'<option value="">— seleziona —</option>';
  db.classi.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nome;el.appendChild(o);});
  if(cur) el.value=cur;
}

load();
</script>
</body>
</html>
